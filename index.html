<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Master | Professional Document Suite</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #050510);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 60s linear infinite;
            pointer-events: none;
        }
        
        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }
        
        /* Glass Morphism Container */
        .container {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }
        
        /* Premium Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #a0a0ff;
            margin-bottom: 1rem;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            font-weight: 400;
        }
        
        /* 3D Card Effect */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }
        
        /* Tabs - Minimal Premium */
        .tabs {
            display: flex;
            gap: 0.5rem;
            padding: 1.5rem 2rem 0 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .tab-btn {
            padding: 0.875rem 1.75rem;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 12px;
            position: relative;
        }
        
        .tab-btn:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        
        .tab-btn.active {
            color: white;
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            backdrop-filter: blur(10px);
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
        }
        
        /* Content Area */
        .content {
            padding: 2rem;
        }
        
        .tab-pane {
            display: none;
            animation: fadeInUp 0.5s ease;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Form Elements - Premium Style */
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            font-size: 0.875rem;
            letter-spacing: 0.3px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 200px;
        }
        
        /* Premium Button */
        .btn {
            padding: 0.875rem 1.75rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* Quality Options - Minimal */
        .quality-grid {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        
        .quality-option {
            flex: 1;
            min-width: 80px;
        }
        
        .quality-option input {
            display: none;
        }
        
        .quality-option label {
            display: block;
            padding: 0.625rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0;
            font-size: 0.8rem;
        }
        
        .quality-option input:checked + label {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        /* Image Preview */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .preview-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
        }
        
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Code Editor */
        .code-container {
            background: #0a0a0f;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .code-header {
            padding: 1rem;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Message Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            border-left: 3px solid #667eea;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
                margin: 1rem auto;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .tabs {
                padding: 1rem;
                overflow-x: auto;
            }
            
            .tab-btn {
                padding: 0.625rem 1rem;
                font-size: 0.8rem;
                white-space: nowrap;
            }
            
            .content {
                padding: 1.5rem;
            }
            
            .quality-grid {
                flex-direction: column;
            }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
        
        /* Utility */
        .mt-3 {
            margin-top: 1rem;
        }
        
        .flex {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">PREMIUM SUITE</div>
            <h1>PDF Master</h1>
            <div class="subtitle">Professional Document Conversion Suite</div>
        </div>
        
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" data-tab="text">Text</button>
                <button class="tab-btn" data-tab="image">Image</button>
                <button class="tab-btn" data-tab="code">Code</button>
                <button class="tab-btn" data-tab="edit">Edit</button>
            </div>
            
            <div class="content">
                <!-- Text to PDF -->
                <div class="tab-pane active" id="textPane">
                    <div class="input-group">
                        <label>Document Title</label>
                        <input type="text" id="docTitle" placeholder="Untitled Document">
                    </div>
                    <div class="input-group">
                        <label>Content</label>
                        <textarea id="textContent" placeholder="Write or paste your content here..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>Quality</label>
                        <div class="quality-grid">
                            <div class="quality-option">
                                <input type="radio" name="textQuality" value="standard" id="textStd" checked>
                                <label for="textStd">Standard</label>
                            </div>
                            <div class="quality-option">
                                <input type="radio" name="textQuality" value="high" id="textHigh">
                                <label for="textHigh">High</label>
                            </div>
                            <div class="quality-option">
                                <input type="radio" name="textQuality" value="ultra" id="textUltra">
                                <label for="textUltra">Ultra</label>
                            </div>
                        </div>
                    </div>
                    <button class="btn" onclick="convertText()">Generate PDF</button>
                </div>
                
                <!-- Image to PDF -->
                <div class="tab-pane" id="imagePane">
                    <div class="input-group">
                        <label>Upload Images</label>
                        <input type="file" id="imageInput" accept="image/*" multiple onchange="previewImages()">
                    </div>
                    <div class="input-group">
                        <label>Quality</label>
                        <div class="quality-grid">
                            <div class="quality-option">
                                <input type="radio" name="imgQuality" value="0.7" id="imgStd" checked>
                                <label for="imgStd">Standard</label>
                            </div>
                            <div class="quality-option">
                                <input type="radio" name="imgQuality" value="0.9" id="imgHigh">
                                <label for="imgHigh">High</label>
                            </div>
                            <div class="quality-option">
                                <input type="radio" name="imgQuality" value="1.0" id="imgUltra">
                                <label for="imgUltra">Ultra</label>
                            </div>
                        </div>
                    </div>
                    <div id="imagePreviewContainer" style="display: none;">
                        <div class="preview-grid" id="imageGrid"></div>
                    </div>
                    <button class="btn" id="convertImagesBtn" onclick="convertImages()" disabled>Generate PDF</button>
                </div>
                
                <!-- Code to PDF -->
                <div class="tab-pane" id="codePane">
                    <div class="input-group">
                        <label>Title</label>
                        <input type="text" id="codeTitle" placeholder="Code Documentation">
                    </div>
                    <div class="input-group">
                        <label>Language</label>
                        <select id="codeLang">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="cpp">C++</option>
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Code</label>
                        <textarea id="codeInput" rows="12" placeholder="Paste your code here..."></textarea>
                    </div>
                    <button class="btn" onclick="convertCode()">Generate PDF</button>
                </div>
                
                <!-- Edit PDF -->
                <div class="tab-pane" id="editPane">
                    <div class="input-group">
                        <label>Upload PDF</label>
                        <input type="file" id="pdfFile" accept=".pdf">
                    </div>
                    <div class="flex">
                        <button class="btn btn-secondary" onclick="extractInfo()">Extract Info</button>
                        <button class="btn btn-secondary" onclick="rotateDocument()">Rotate 90°</button>
                        <button class="btn btn-secondary" onclick="compressDocument()">Compress</button>
                    </div>
                    <div id="editResult" style="margin-top: 1rem; display: none;">
                        <div class="input-group">
                            <label>Information</label>
                            <textarea id="infoText" rows="6" readonly style="background: rgba(0,0,0,0.3);"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let selectedImagesData = [];
        
        // Tab switching with smooth animation
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${tab}Pane`).classList.add('active');
            });
        });
        
        // Image preview
        function previewImages() {
            const input = document.getElementById('imageInput');
            const container = document.getElementById('imagePreviewContainer');
            const grid = document.getElementById('imageGrid');
            const convertBtn = document.getElementById('convertImagesBtn');
            
            selectedImagesData = [];
            
            if (input.files.length > 0) {
                container.style.display = 'block';
                grid.innerHTML = '';
                
                Array.from(input.files).forEach((file, idx) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const div = document.createElement('div');
                        div.className = 'preview-item';
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        div.appendChild(img);
                        grid.appendChild(div);
                        selectedImagesData.push(e.target.result);
                        
                        if (selectedImagesData.length === input.files.length) {
                            convertBtn.disabled = false;
                        }
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                container.style.display = 'none';
                convertBtn.disabled = true;
            }
        }
        
        // Text to PDF
        async function convertText() {
            const content = document.getElementById('textContent').value.trim();
            const title = document.getElementById('docTitle').value.trim() || 'Document';
            const quality = document.querySelector('input[name="textQuality"]:checked').value;
            
            if (!content) {
                showToast('Please enter content', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const element = document.createElement('div');
                element.style.padding = '50px';
                element.style.fontFamily = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
                element.style.backgroundColor = '#ffffff';
                element.style.maxWidth = '800px';
                element.style.margin = '0 auto';
                
                let fontSize = '14px';
                let lineHeight = '1.6';
                let scale = 2;
                
                if (quality === 'high') {
                    fontSize = '15px';
                    lineHeight = '1.7';
                    scale = 3;
                } else if (quality === 'ultra') {
                    fontSize = '16px';
                    lineHeight = '1.8';
                    scale = 4;
                }
                
                element.innerHTML = `
                    <div style="text-align: center; margin-bottom: 40px;">
                        <h1 style="color: #1a1a2e; font-size: 28px; margin-bottom: 10px;">${escapeHtml(title)}</h1>
                        <hr style="border: none; height: 2px; background: linear-gradient(90deg, #667eea, #764ba2); margin: 20px 0;">
                    </div>
                    <div style="font-size: ${fontSize}; line-height: ${lineHeight}; color: #2d2d2d;">
                        ${escapeHtml(content).replace(/\n/g, '<br>')}
                    </div>
                    <div style="margin-top: 50px; text-align: center; font-size: 10px; color: #999; border-top: 1px solid #e0e0e0; padding-top: 20px;">
                        Generated by PDF Master | ${new Date().toLocaleString()}
                    </div>
                `;
                
                document.body.appendChild(element);
                
                const opt = {
                    margin: [0.75, 0.75, 0.75, 0.75],
                    filename: `${title.replace(/[^a-z0-9]/gi, '_')}.pdf`,
                    image: { type: 'jpeg', quality: quality === 'ultra' ? 1 : 0.98 },
                    html2canvas: { scale: scale, logging: false, useCORS: true },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };
                
                await html2pdf().set(opt).from(element).save();
                document.body.removeChild(element);
                
                showToast('PDF generated successfully', 'success');
            } catch (error) {
                showToast('Generation failed', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Images to PDF
        async function convertImages() {
            if (selectedImagesData.length === 0) {
                showToast('Please select images', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const { jsPDF } = window.jspdf;
                const quality = parseFloat(document.querySelector('input[name="imgQuality"]:checked').value);
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                
                for (let i = 0; i < selectedImagesData.length; i++) {
                    if (i > 0) pdf.addPage();
                    
                    const img = new Image();
                    await new Promise((resolve) => {
                        img.onload = () => {
                            const ratio = img.width / img.height;
                            let width = pageWidth - 20;
                            let height = width / ratio;
                            
                            if (height > pageHeight - 20) {
                                height = pageHeight - 20;
                                width = height * ratio;
                            }
                            
                            const x = (pageWidth - width) / 2;
                            const y = (pageHeight - height) / 2;
                            pdf.addImage(img, 'JPEG', x, y, width, height, undefined, quality);
                            resolve();
                        };
                        img.src = selectedImagesData[i];
                    });
                }
                
                pdf.save('images.pdf');
                showToast(`${selectedImagesData.length} image(s) converted`, 'success');
                
                document.getElementById('imageInput').value = '';
                document.getElementById('imagePreviewContainer').style.display = 'none';
                document.getElementById('convertImagesBtn').disabled = true;
                selectedImagesData = [];
            } catch (error) {
                showToast('Conversion failed', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Code to PDF
        async function convertCode() {
            const code = document.getElementById('codeInput').value;
            const title = document.getElementById('codeTitle').value.trim() || 'Code Document';
            const language = document.getElementById('codeLang').value;
            
            if (!code) {
                showToast('Please enter code', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const element = document.createElement('div');
                element.style.padding = '40px';
                element.style.backgroundColor = '#0a0a0f';
                element.style.color = '#e0e0e0';
                element.style.fontFamily = 'Monaco, "Courier New", monospace';
                
                element.innerHTML = `
                    <div style="background: linear-gradient(135deg, #667eea, #764ba2); padding: 25px; border-radius: 12px; margin-bottom: 25px;">
                        <h1 style="color: white; margin: 0; font-size: 24px;">${escapeHtml(title)}</h1>
                        <p style="color: rgba(255,255,255,0.8); margin-top: 8px;">Language: ${language.toUpperCase()}</p>
                    </div>
                    <pre style="background: #0a0a0f; padding: 20px; overflow-x: auto; font-size: 12px; line-height: 1.5;"><code>${escapeHtml(code)}</code></pre>
                    <div style="margin-top: 30px; text-align: center; font-size: 10px; color: #666; border-top: 1px solid #2d2d2d; padding-top: 20px;">
                        Generated by PDF Master
                    </div>
                `;
                
                document.body.appendChild(element);
                
                const opt = {
                    margin: [0.5, 0.5, 0.5, 0.5],
                    filename: `${title.replace(/[^a-z0-9]/gi, '_')}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2.5, logging: false },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };
                
                await html2pdf().set(opt).from(element).save();
                document.body.removeChild(element);
                
                showToast('Code PDF generated', 'success');
            } catch (error) {
                showToast('Generation failed', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // PDF Edit Functions
        let currentPDFBuffer = null;
        
        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                currentPDFBuffer = await file.arrayBuffer();
                showToast(`Loaded: ${file.name}`, 'success');
            }
        });
        
        async function extractInfo() {
            if (!currentPDFBuffer) {
                showToast('Please upload a PDF', 'error');
                return;
            }
            
            try {
                const pdfDoc = await PDFLib.PDFDocument.load(currentPDFBuffer);
                const pages = pdfDoc.getPages();
                const info = `Pages: ${pages.length}\nSize: ${(currentPDFBuffer.byteLength / 1024).toFixed(2)} KB\nVersion: PDF ${pdfDoc.getVersion() || '1.4'}`;
                
                document.getElementById('infoText').value = info;
                document.getElementById('editResult').style.display = 'block';
                showToast('Information extracted', 'success');
            } catch (error) {
                showToast('Extraction failed', 'error');
            }
        }
        
        async function rotateDocument() {
            if (!currentPDFBuffer) {
                showToast('Please upload a PDF', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const pdfDoc = await PDFLib.PDFDocument.load(currentPDFBuffer);
                const pages = pdfDoc.getPages();
                pages.forEach(page => page.setRotation(PDFLib.degrees(90)));
                
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'rotated.pdf';
                link.click();
                URL.revokeObjectURL(link.href);
                
                showToast('PDF rotated', 'success');
            } catch (error) {
                showToast('Rotation failed', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        async function compressDocument() {
            if (!currentPDFBuffer) {
                showToast('Please upload a PDF', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const pdfDoc = await PDFLib.PDFDocument.load(currentPDFBuffer);
                const pdfBytes = await pdfDoc.save({ useObjectStreams: false });
                
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'compressed.pdf';
                link.click();
                URL.revokeObjectURL(link.href);
                
                const originalSize = (currentPDFBuffer.byteLength / 1024).toFixed(2);
                const newSize = (pdfBytes.byteLength / 1024).toFixed(2);
                showToast(`Compressed: ${originalSize}KB → ${newSize}KB`, 'success');
            } catch (error) {
                showToast('Compression failed', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Helper Functions
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        function showLoading(show) {
            const btns = document.querySelectorAll('.btn:not(.btn-secondary)');
            btns.forEach(btn => {
                if (show && !btn.disabled) {
                    btn.disabled = true;
                    const originalText = btn.textContent;
                    btn.setAttribute('data-original', originalText);
                    btn.innerHTML = originalText + '<span class="spinner"></span>';
                } else if (!show && btn.disabled) {
                    btn.disabled = false;
                    const original = btn.getAttribute('data-original');
                    if (original) {
                        btn.innerHTML = original;
                        btn.removeAttribute('data-original');
                    }
                }
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Sample content on load
        window.addEventListener('load', () => {
            const textarea = document.getElementById('textContent');
            if (textarea.value === '') {
                textarea.value = 'PDF Master\n\nProfessional Document Conversion\n\nCreate stunning PDF documents with ease.\n\n✓ High quality output\n✓ Multiple formats supported\n✓ Fast & reliable';
            }
        });
    </script>
</body>
</html>
